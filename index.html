<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>商品購物車</title>
  <link rel="stylesheet" href="style.css">
</head>
  
<!-- ===== Header ===== -->
<header>
  <div class="logo">Sweet Cake</div>
  <div class="nav-right">
    <span id="user-info">未登入</span>
    <button class="btn-outline" onclick="openLogin()">登入</button>
  </div>
</header>

<h1 class="main-title">精選甜點</h1>

<!-- ===== 商品區 ===== -->
<div class="products">

  <!-- 商品卡片 -->
  <div class="product">
    <img src="img/01.png">
    <h3>草莓蛋糕</h3>
    <p class="price">$120</p>
    <input type="number" min="1" value="1" id="qty1">
    <button onclick="addToCart('草莓蛋糕',120,'qty1')" class="btn-primary">加入購物車</button>
  </div>

  <div class="product">
    <img src="img/02.png">
    <h3>巧克力蛋糕</h3>
    <p class="price">$120</p>
    <input type="number" min="1" value="1" id="qty2">
    <button onclick="addToCart('巧克力蛋糕',120,'qty2')" class="btn-primary">加入購物車</button>
  </div>

  <div class="product">
    <img src="img/03.png">
    <h3>藍莓乳酪</h3>
    <p class="price">$120</p>
    <input type="number" min="1" value="1" id="qty3">
    <button onclick="addToCart('藍莓乳酪',120,'qty3')" class="btn-primary">加入購物車</button>
  </div>

</div>

<!-- ===== 購物車區 ===== -->
<section class="cart-section">
  <h2>購物車</h2>

  <table>
    <thead>
      <tr>
        <th>商品</th>
        <th>數量</th>
        <th>單價</th>
        <th>小計</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="cart-list"></tbody>
  </table>

  <div class="cart-total">
    總金額：<span>$<span id="total">0</span></span>
  </div>

  <button class="btn-checkout" onclick="checkout()">前往結帳</button>
</section>

<!-- ===== 登入 Modal ===== -->
<div id="login-modal" class="modal hidden">
  <div class="modal-content">
    <h3>會員登入</h3>
    <input type="text" id="login-account" placeholder="帳號">
    <input type="password" id="login-password" placeholder="密碼">
    <button class="btn-primary" onclick="login()">登入</button>
  </div>
</div>

<!-- ===== 付款區 ===== -->
<div id="checkout-section" class="checkout hidden">
  <h2>信用卡付款</h2>
  <input type="text" placeholder="卡號">
  <input type="text" placeholder="有效期限">
  <input type="text" placeholder="安全碼">
  <button class="btn-primary" onclick="fakePayment()">確認付款</button>
</div>

<script src="script.js"></script>
</body>
</html>
